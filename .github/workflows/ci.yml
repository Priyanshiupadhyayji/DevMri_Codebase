name: DevMRI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: 🩻 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📋 Install Dependencies
        run: npm ci

      - name: 🔍 Lint Check
        run: npm run lint --if-present

      - name: 🧪 Run Tests
        run: npm test --if-present

      - name: 🏗️ Build
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Build Success
        if: success()
        run: echo "🩻 DevMRI build passed — DX Score pipeline healthy"
